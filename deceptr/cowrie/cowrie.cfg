[honeypot]
# Realistic hostname — looks like a real Moroccan gov server
hostname = srv-parl-app01

# Fake server version — OpenSSH on Ubuntu 22.04 LTS
# This overrides the default Cowrie banner
ssh_version_string = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

# Realistic kernel/uname output
kernel_version = 5.15.0-91-generic
kernel_build_string = #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023
architecture = x86_64
hardware_platform = x86_64
operating_system = GNU/Linux

# Timezone matching Morocco (UTC+1)
timezone = Africa/Casablanca

# Session timeouts
interactive_timeout = 180
authentication_timeout = 30

[ssh]
enabled = true
# Listen on standard port inside container (mapped to 22 on host by docker)
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

# Realistic failed login count before session ends (not lockout, resets per session)
auth_count_max = 5

# RSA key paths (generated at deploy time by generate-keys.ps1)
rsa_public_key = data/ssh-keys/ssh_host_rsa_key.pub
dsa_public_key = data/ssh-keys/ssh_host_dsa_key.pub
ecdsa_public_key = data/ssh-keys/ssh_host_ecdsa_key.pub
ed25519_public_key = data/ssh-keys/ssh_host_ed25519_key.pub

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[output_jsonlog]
enabled = true
logfile = var/log/cowrie/cowrie.json

[output_elasticsearch]
enabled = false
host = elasticsearch
port = 9200
index = cowrie
